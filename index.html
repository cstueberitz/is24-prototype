<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;}

.phone-stage{
  display:flex;align-items:center;justify-content:center;
  width:100vw;height:100vh;
}
.phone-frame{
  width:390px;height:844px;
  background:#fff;border-radius:44px;
  box-shadow:0 0 0 8px #2c2c2c,0 0 0 10px #3a3a3a,0 30px 100px rgba(0,0,0,0.7);
  overflow:hidden;position:relative;
  transform-origin:center center;
  flex-shrink:0;
}

@keyframes heyimmo-ring-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes heyimmo-breathe{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.13);opacity:.85;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes sunrise-breathe{0%,100%{opacity:.80;}50%{opacity:.95;}}
@keyframes dot-pulse{0%,100%{opacity:.25;transform:scale(.75);}50%{opacity:1;transform:scale(1);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

@keyframes textShimmer{
  0%   { background-position: 300% center; }
  100% { background-position: -50% center; }
}
.shimmer-text{
  background: linear-gradient(90deg,
    #292526 0%,
    #292526 30%,
    #aaaaaa 50%,
    #292526 70%,
    #292526 100%);
  background-size: 300% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  animation: textShimmer 1s cubic-bezier(.4,0,.2,1) forwards;
}

@keyframes slideInRight{from{transform:translateX(100%);}to{transform:translateX(0);}}
@keyframes slideOutLeft{from{transform:translateX(0);opacity:1;}to{transform:translateX(-25%);opacity:.6;}}
@keyframes slideInLeft{from{transform:translateX(-25%);opacity:.6;}to{transform:translateX(0);opacity:1;}}
@keyframes slideOutRight{from{transform:translateX(0);}to{transform:translateX(100%);}}
@keyframes sheetIn{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes sheetOut{from{transform:translateY(0);}to{transform:translateY(100%);}}

.slide-in-right{animation:slideInRight .38s cubic-bezier(.28,1,.4,1) forwards;}
.slide-out-left{animation:slideOutLeft .38s cubic-bezier(.28,1,.4,1) forwards;}
.slide-in-left{animation:slideInLeft .38s cubic-bezier(.28,1,.4,1) forwards;}
.slide-out-right{animation:slideOutRight .38s cubic-bezier(.28,1,.4,1) forwards;}
.sheet-in{animation:sheetIn .4s cubic-bezier(.16,1,.3,1) forwards;}
.sheet-out{animation:sheetOut .25s ease-in forwards;}

button{-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{display:none;}
</style>

<body>
<div class="phone-stage">
  <div class="phone-frame" id="root"></div>
</div>
<script>
(function scalePhone() {
  const frame = document.querySelector('.phone-frame');
  if (!frame) return;
  const scale = Math.min(window.innerWidth / 410, window.innerHeight / 864, 1);
  frame.style.transform = 'scale(' + scale + ')';
  window.addEventListener('resize', scalePhone);
})();
</script>

/* ─── BOTTOM NAV ─── */
function BottomNav({ activeTab='suchen', onTab }) {
  const tabs = [
    {id:'suchen',label:'Suchen',icon:SearchIcon},
    {id:'immos',label:'Meine Immos',icon:HeartIcon},
    {id:'inserieren',label:'Inserieren',icon:PlusCircle},
    {id:'nachrichten',label:'Nachrichten',icon:ChatIcon},
    {id:'heyimmo',label:'HeyImmo',icon:null},
  ];
  return (
    <div style={{position:'absolute',bottom:0,left:0,right:0,height:88,background:'#fff',
      borderTop:'1px solid #e0e0e0',
      display:'flex',alignItems:'flex-end',justifyContent:'space-around',
      padding:'0 4px 24px',zIndex:5}}>
      {tabs.map(t => {
        const isActive = t.id === activeTab;
        return (
          <button key={t.id}
            onClick={() => onTab && onTab(t.id)}
            style={{background:'none',border:'none',cursor:'pointer',
              display:'flex',flexDirection:'column',alignItems:'center',
              gap:2,padding:'4px 6px',minWidth:52,transition:'opacity .15s'}}>
            {t.id==='heyimmo'
              ? <HeyImmoIcon active={false} size={32}/>
              : <t.icon c={isActive?'#333':'#757575'}/>}
            <span style={{fontSize:10,fontWeight:isActive?700:400,
              color:isActive?'#333':'#757575',lineHeight:'12.5px',fontFamily:'Inter'}}>
              {t.label}
            </span>
          </button>
        );
      })}
    </div>
  );
}

/* ─── PROPERTY PHOTO ─── */
function PropPhoto({ h=180, score, gradStart='#e8e8e8', gradEnd='#d0d0d0', useReal=false }) {
  return (
    <div style={{position:'relative',height:h,overflow:'hidden',flexShrink:0}}>
      <img src="assets/property-photo.jpg" alt=""
        style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
      {score && (
        <div style={{position:'absolute',bottom:10,right:10,
          width:44,height:44,borderRadius:'50%',
          background:'#fff',border:'3px solid #00FED0',
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 2px 8px rgba(0,0,0,.12)'}}>
          <span style={{fontSize:13,fontWeight:700,color:'#333',fontFamily:'Inter'}}>{score}</span>
        </div>

}

/* ─── HEYIMMO BOTTOM SHEET ─── */

  const [visible,setVisible] = useState(false);
  const [closing,setClosing] = useState(false);

  useEffect(()=>{
    requestAnimationFrame(()=>setVisible(true));
  },[]);


  function handleClose(){
    setClosing(true);
    setTimeout(onClose,260);
  }

  return (
    <>
      <div onClick={handleClose}
        style={{position:'absolute',inset:'0 0 88px 0',background:'rgba(0,0,0,.2)',zIndex:10,
          opacity:visible?1:0,transition:'opacity .3s'}}/>
      <div className={closing?'sheet-out':visible?'sheet-in':''}

          background:'#fff',borderRadius:'20px 20px 0 0',
          maxHeight:'80%',zIndex:11,display:'flex',flexDirection:'column',

        <div style={{display:'flex',justifyContent:'center',padding:'10px 0 4px'}}>
          <div style={{width:40,height:4,background:'#e0e0e0',borderRadius:2}}/>

/* ─── SCREEN: SEARCHING / AI LOADING ─── */
function ScreenSearching({ onComplete }) {
  const STEPS = [
    "Claude wurde erkannt",
    "Arbeitsweg-Toleranz berechnet",
    "Familienpläne wurden erkannt",
    "Wohlfühlfaktoren erkannt",
    "Zukünftige Bedürfnisse analysiert",
    "Geräuschempfindlichkeit erkannt",
    "Personalisierte Suche wird vorbereitet",
  ];

  const [completed, setCompleted] = useState([]);
  const [current, setCurrent] = useState(0);
  const [typed, setTyped] = useState('');
  const [done, setDone] = useState(false);
  const [showFinal, setShowFinal] = useState(false);

  useEffect(()=>{
    if(done||current>=STEPS.length)return;
    const target = STEPS[current];
    let i=0;
    setTyped('');
    const iv = setInterval(()=>{
      if(i<target.length){
        setTyped(target.slice(0,i+1));
        i++;
      } else {
        clearInterval(iv);
        setTimeout(()=>{
          setCompleted(c=>[...c,current]);
          setCurrent(s=>s+1);
        }, 350);
      }
    }, Math.random()*12+20);
    return()=>clearInterval(iv);
  },[current,done]);

  useEffect(()=>{
    if(current>=STEPS.length&&!done){
      setTimeout(()=>{ setDone(true); setTimeout(()=>setShowFinal(true),300); },600);
    }
  },[current]);

  return (
    <div style={{position:'absolute',inset:0,background:'#fff',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <SunriseTop/>
      <div style={{flex:1,overflowY:'auto',padding:'24px 16px'}}>
        {/* Title */}
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontWeight:700,fontSize:18,color:'#333',fontFamily:'Inter',marginBottom:8,transition:'all .5s ease'}}>
            {showFinal?'Deine Suche kennt jetzt mehr von dir':'Wir verbinden deine KI'}
          </div>
          {!showFinal&&(
            <div style={{fontSize:14,color:'#757575',lineHeight:1.55,fontFamily:'Inter'}}>
              ImmoScout24 liest relevante Kontexte aus deinem KI-Assistenten.
            </div>
          )}
        </div>

        {/* Steps */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {completed.map(idx=>(
            <div key={idx} style={{display:'flex',gap:12,alignItems:'center',animation:'fadeInUp .3s ease-out'}}>
              <HeyImmoIcon active={false} size={32}/>
              <span className="shimmer-text" style={{fontSize:14,fontFamily:'Inter'}}>{STEPS[idx]}</span>
            </div>
          ))}
          {!done&&current<STEPS.length&&(
            <div style={{display:'flex',gap:12,alignItems:'center',animation:'fadeInUp .3s ease-out'}}>
              <HeyImmoIcon active={true} size={32}/>
              <span style={{fontSize:14,color:'#333',fontFamily:'Inter'}}>
                {typed}<span style={{animation:'blink .8s step-end infinite'}}>|</span>
              </span>
            </div>
          )}
        </div>

        {/* Final */}
        {showFinal&&(
          <div style={{marginTop:28,display:'flex',flexDirection:'column',gap:16,alignItems:'center'}}>
            <div style={{fontSize:15,color:'#333',lineHeight:1.6,fontFamily:'Inter',textAlign:'center',
              animation:'fadeInUp .4s ease-out'}}>
              Hi Chris, deine passenden Ergebnisse sind vorbereitet und passen nun{' '}
              <strong>100% zu dir und deinem Lifestyle.</strong>
            </div>
            <button onClick={onComplete}
              style={{borderRadius:999,background:'#333',border:'none',
                padding:'12px 28px',color:'#fff',fontWeight:700,fontSize:14,
                fontFamily:'Inter',cursor:'pointer',
                animation:'fadeInUp .4s .15s ease-out both',
                transition:'background .2s'}}
              onMouseEnter={e=>e.currentTarget.style.background='#1a1a1a'}
              onMouseLeave={e=>e.currentTarget.style.background='#333'}>
              Passende Ergebnisse ansehen →
            </button>
            <div style={{display:'flex',gap:16,animation:'fadeInUp .4s .3s ease-out both'}}>
              <button style={{background:'none',border:'none',cursor:'pointer'}}><ThumbUp/></button>
              <button style={{background:'none',border:'none',cursor:'pointer'}}><ThumbDown/></button>
            </div>
          </div>
        )}
      </div>
      <BottomNav activeTab="" onTab={()=>{}}/>
    </div>
  );
}

/* ─── SCREEN TRANSITION WRAPPER ─── */
function Transition({ screenKey, dir, children }) {
  const [anim, setAnim] = useState('');
  const prevKeyRef = useRef(screenKey);

  useEffect(()=>{
    if(prevKeyRef.current===screenKey)return;
    prevKeyRef.current=screenKey;
  },[screenKey]);

  return <>{children}</>;
}

/* ─── MAIN APP ─── */
function App() {
  // Persist screen across refreshes
  const saved = (() => { try { return localStorage.getItem('is24_screen')||'home'; } catch(e){ return 'home'; } })();
  const [screen, setScreen] = useState(saved);
  const [prev, setPrev] = useState(null);
  const [dir, setDir] = useState(1); // 1=forward, -1=back
  const [busy, setBusy] = useState(false);
  const [sheetPhase, setSheetPhase] = useState('closed'); // closed|loading|response

  const ORDER = {home:0,search:1,connect:2,searching:3,'new-home':4};

  function go(to, back=false) {
    if(busy) return;
    const d = back ? -1 : (ORDER[to]??1)>=(ORDER[screen]??0) ? 1 : -1;
    setDir(d);
    setPrev(screen);
    setScreen(to);
    setBusy(true);
    try { localStorage.setItem('is24_screen', to); } catch(e){}
    setTimeout(()=>{ setPrev(null); setBusy(false); }, 420);
  }

  function openSheet() {
    setSheetPhase('loading');
    setTimeout(()=>setSheetPhase('response'), 1500);
  }

  function getAnim(s, entering) {
    if(entering) return dir>0 ? 'slide-in-right' : 'slide-in-left';
    return dir>0 ? 'slide-out-left' : 'slide-out-right';
  }

  function wrap(s, el) {
    const isCurrent = screen===s;
    const isPrev = prev===s;
    if(!isCurrent && !isPrev) return null;
    const cl = isCurrent && prev ? getAnim(s,true) : isPrev ? getAnim(s,false) : '';
    return (
      <div key={s} className={cl}
        style={{position:'absolute',inset:0,willChange:'transform',
          zIndex:isCurrent&&prev?2:isPrev?1:2}}>
        {el}
      </div>
    );
  }

  return (
    <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden'}}>

      {wrap('home',
        <ScreenHome
          onResults={()=>go('search')}
          onHeyImmo={openSheet}
        />
      )}

      {wrap('search',
        <ScreenManualSearch
          onBack={()=>go('home',true)}
          onImportLifestyle={()=>go('connect')}
        />
      )}

      {wrap('connect',
        <ScreenConnectionInfo
          onBack={()=>go('home',true)}
          onConnect={()=>go('searching')}
          onLater={()=>go('home',true)}
        />
      )}

      {wrap('searching',
        <ScreenSearching
          onComplete={()=>go('new-home')}
        />
      )}

      {wrap('new-home',
        <ScreenNewHome
          onBack={()=>go('search',true)}
        />
      )}

      {/* HeyImmo sheet over home */}
      {screen==='home' && sheetPhase!=='closed' && (
        <HeyImmoSheet
          phase={sheetPhase}
          onClose={()=>setSheetPhase('closed')}
          onNavigate={()=>{ setSheetPhase('closed'); setTimeout(()=>go('connect'),100); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
